<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8" />
	<title>완주군 - 완주군 대시보드</title>
	{{> meta}}

</head>

<body>
	<div class="board">
		<!-- 좌측 패널 -->
		<aside class="panel">
			<!-- 대시보드 헤더 -->
			<header class="dashboard-header">
				<div class="dashboard-header__brand">
					<h1 class="dashboard-header__logo">
						<img src="./assets/images/dashboard/logo.png" alt="완주군시설관리공단">
					</h1>
					<h2 class="dashboard-header__title">완주군청</h2>
				</div>
				<div class="dashboard-header__info">
					<div class="dashboard-header__weather">
						<span class="dashboard-header__weather-icon" aria-hidden="true"></span>
						<span class="dashboard-header__weather-temp"><strong>32</strong>°C</span>
					</div>
					<div class="dashboard-header__datetime">
						<div class="dashboard-header__date">2026년 03월 04일 (수)</div>
						<div class="dashboard-header__time">오후 06:00</div>
					</div>
				</div>
			</header>

			<!-- 버스 카드 목록 -->
			<div class="bus-card-list" id="busCardList">
				<article class="bus-card">
					<div class="bus-card__inner">
						<div class="bus-card__face bus-card__face--front"></div>
						<div class="bus-card__face bus-card__face--back"></div>
					</div>
				</article>
				<article class="bus-card">
					<div class="bus-card__inner">
						<div class="bus-card__face bus-card__face--front"></div>
						<div class="bus-card__face bus-card__face--back"></div>
					</div>
				</article>
				<article class="bus-card">
					<div class="bus-card__inner">
						<div class="bus-card__face bus-card__face--front"></div>
						<div class="bus-card__face bus-card__face--back"></div>
					</div>
				</article>
			</div>
		</aside>

		<!-- 우측 지도 -->
		<main class="map">
			<div class="map__arrival-banner" id="arrivalBanner">
				<span class="map__arrival-title">잠시 후 도착</span>
				<div class="map__arrival-empty">도착 정보가 없습니다.</div>
				<ul class="map__arrival-list"></ul>
			</div>
		</main>
	</div>

	<script type="module" src="/js/main.js"></script>
	<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
